<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERS Shop floor tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #06b6d4;
      --header: linear-gradient(90deg, #6366f1, #06b6d4);
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: var(--bg);
      color: #fff;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      background: var(--header);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    * { box-sizing: border-box; }

    .container { padding: 15px; max-width: 1100px; margin: auto; }
    
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    /* Mobile First Form Layout */
    .form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
    }

    /* Desktop Form Adjustment */
    @media (min-width: 768px) {
      .form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        padding: 20px;
      }
    }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
      width: 100%;
      font-family: inherit;
    }
    input:focus, select:focus { border-color: var(--accent); }
    
    button {
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 14px; /* Slightly larger tap target on mobile */
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { background: #475569; cursor: not-allowed; }

    .table-container { 
      overflow-x: auto; 
      border-radius: 10px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
      -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      min-width: 600px; /* Ensures columns don't squish too much on phones */
    }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
    th { background: #334155; color: #94a3b8; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    
    .status-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      background: #334155;
      border: 1px solid #475569;
      white-space: nowrap;
    }
    .btn-delete { background: #ef4444; padding: 8px 12px; font-size: 11px; width: auto; }

    /* Overlays */
    .loading-overlay { text-align: center; padding: 20px; color: var(--accent); display: none; font-weight: 600; }
    .error-msg { color: #f87171; text-align: center; padding: 10px; display: none; margin-bottom: 10px; background: #451a1a; border-radius: 8px; }
  </style>
</head>
<body>

<header>🏭 ERS Shop floor tracker</header>

<div class="container">
  <div id="errorDisplay" class="error-msg"></div>

  <div class="top-actions">
    <h3 style="margin:0">Active Jobs</h3>
  </div>

  <div class="form">
    <input id="jobName" placeholder="Job Name">
    <input id="wo" placeholder="Work Order">
    <select id="location">
      <option value="Workstation 1">Workstation 1</option>
      <option value="Workstation 2">Workstation 2</option>
      <option value="Workstation 3">Workstation 3</option>
      <option value="Workstation 4">Workstation 4</option>
      <option value="Workstation 5">Workstation 5</option>
      <option value="Workstation 6">Workstation 6</option>
      <option value="Workstation 7">Workstation 7</option>
      <option value="Workstation 8">Workstation 8</option>
    </select>
    <input id="status" placeholder="Status...">
    <input id="date" type="date">
    <button id="addBtn" onclick="addJob()">Add Job</button>
  </div>

  <div id="loading" class="loading-overlay">⚙️ Updating Shopfloor...</div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Job</th>
          <th>WO</th>
          <th>Location</th>
          <th>Status</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz6JGqKSpnPegAraDGKd0kF1k5MH5kgIpu79OIrQ1CVZTSoJZ8z71nMwm6RXe19kuefPg/exec";
  let currentJobs = [];

  const showLoading = (show) => {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.getElementById('addBtn').disabled = show;
  };

  const showError = (msg) => {
    const errDiv = document.getElementById('errorDisplay');
    if (msg) {
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
      setTimeout(() => errDiv.style.display = 'none', 5000);
    } else {
      errDiv.style.display = 'none';
    }
  };

  async function fetchJobs() {
    showError(null);
    try {
      showLoading(true);
      const response = await fetch(`${API_URL}?t=${Date.now()}`);
      if (!response.ok) throw new Error("Server error");
      
      currentJobs = await response.json();
      const body = document.getElementById('tableBody');
      body.innerHTML = '';
      
      currentJobs.forEach((job, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${job.jobName || ''}</td>
          <td>${job.wo || ''}</td>
          <td>${job.location || ''}</td>
          <td><span class="status-pill">${job.status || 'N/A'}</span></td>
          <td>${job.date ? new Date(job.date).toLocaleDateString() : ''}</td>
          <td>
            <button class="btn-delete" onclick="deleteJob(${index})">Delete</button>
          </td>
        `;
        body.appendChild(row);
      });
    } catch (err) {
      showError("Connection failed. Check your API URL.");
    } finally {
      showLoading(false);
    }
  }

  async function addJob() {
    const job = {
      action: 'add',
      jobName: document.getElementById('jobName').value,
      wo: document.getElementById('wo').value,
      location: document.getElementById('location').value,
      status: document.getElementById('status').value,
      date: document.getElementById('date').value
    };

    if(!job.jobName || !job.wo) return;

    showLoading(true);
    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify(job)
      });
      document.getElementById('jobName').value = '';
      document.getElementById('wo').value = '';
      document.getElementById('status').value = '';
      setTimeout(fetchJobs, 1500);
    } catch (e) {
      showError("Failed to add job.");
      showLoading(false);
    }
  }

  async function deleteJob(index) {
    showLoading(true);
    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: 'delete', index: index })
      });
      setTimeout(fetchJobs, 1500);
    } catch (e) {
      showLoading(false);
    }
  }

  window.onload = fetchJobs;
</script>

</body>
</html>

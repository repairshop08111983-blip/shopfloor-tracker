<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ERS Shop floor tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #06b6d4;
      --header: linear-gradient(90deg, #6366f1, #06b6d4);
      --modal-bg: rgba(15, 23, 42, 0.95);
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      background: var(--header);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container { padding: 12px; max-width: 1100px; margin: auto; }
    
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 0 5px;
    }

    .top-actions h3 { font-size: 18px; }

    /* Modal Styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--modal-bg);
      z-index: 1001;
      justify-content: center;
      align-items: flex-end; /* Slide up from bottom on mobile */
      backdrop-filter: blur(8px);
    }

    .modal-content {
      background: var(--card);
      width: 100%;
      max-width: 500px;
      padding: 25px;
      border-radius: 20px 20px 0 0; /* Rounded top for mobile drawer feel */
      box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
      position: relative;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* Desktop adjustment for modal */
    @media (min-width: 768px) {
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-content { border-radius: 16px; animation: fadeIn 0.3s ease-out; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .close-btn {
      background: #334155;
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Form Layout inside Modal */
    .form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    input, select, button {
      padding: 14px; /* Larger tap targets */
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
      width: 100%;
      font-family: inherit;
      font-size: 16px; /* Prevents iOS auto-zoom on focus */
    }
    
    input:focus, select:focus { border-color: var(--accent); }
    
    .btn-primary {
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-add-main {
      width: auto;
      padding: 8px 16px;
      font-size: 13px;
    }

    /* Table Container & Mobile Handling */
    .table-container { 
      overflow-x: auto; 
      border-radius: 12px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
      -webkit-overflow-scrolling: touch;
      background: var(--card);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px; /* Force scroll on mobile to keep data readable */
    }
    
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
    th { background: #334155; color: #94a3b8; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; position: sticky; top: 0; }
    
    .status-pill {
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 11px;
      background: #0f172a;
      border: 1px solid #475569;
      white-space: nowrap;
      font-weight: 600;
      color: var(--accent);
    }
    
    .btn-delete { 
      background: rgba(239, 68, 68, 0.1); 
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 6px 10px; 
      font-size: 11px; 
      width: auto; 
    }

    .loading-overlay { text-align: center; padding: 20px; color: var(--accent); display: none; font-weight: 600; font-size: 14px; }
    .error-msg { color: #f87171; text-align: center; padding: 12px; display: none; margin-bottom: 10px; background: #451a1a; border-radius: 10px; font-size: 13px; }
    
    label { font-size: 13px; color: #94a3b8;display: block; font-weight: 600; }

    /* Add a hint for scrolling on mobile */
    .scroll-hint {
        text-align: center;
        font-size: 11px;
        color: #64748b;
        margin-top: 8px;
        display: block;
    }
    @media (min-width: 768px) { .scroll-hint { display: none; } }
  </style>
</head>
<body>

<header>🏭 ERS Shop floor tracker</header>

<div class="container">
  <div id="errorDisplay" class="error-msg"></div>

  <div class="top-actions">
    <h3 style="margin:0">Job List</h3>
    <button class="btn-primary btn-add-main" onclick="openModal()">+ Add Job</button>
  </div>

  <div id="loading" class="loading-overlay">⌛ Refreshing...</div>

  <!-- Table View -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Job Name</th>
          <th>WO Number</th>
          <th>Location</th>
          <th>Status</th>
          <th>Start Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <span class="scroll-hint">Swipe left/right to view all columns →</span>
</div>

<!-- Modal Popup for adding jobs -->
<div id="jobModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2 style="margin:0; font-size: 18px;">New Job Entry</h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="form">
      <div>
        <label>Job Title</label>
        <input id="jobName" placeholder="Enter job name" autocomplete="off">
      </div>
      <div>
        <label>Work Order</label>
        <input id="wo" placeholder="Enter WO number" autocomplete="off">
      </div>
      <div>
        <label>Workstation</label>
        <select id="location">
          <option value="Workstation 1">Workstation 1</option>
          <option value="Workstation 2">Workstation 2</option>
          <option value="Workstation 3">Workstation 3</option>
          <option value="Workstation 4">Workstation 4</option>
          <option value="Workstation 5">Workstation 5</option>
          <option value="Workstation 6">Workstation 6</option>
          <option value="Workstation 7">Workstation 7</option>
          <option value="Workstation 8">Workstation 8</option>
        </select>
      </div>
      <div>
        <label>Current Status</label>
        <input id="status" placeholder="e.g. In Progress">
      </div>
      <div>
        <label>Start Date</label>
        <input id="date" type="date">
      </div>
      <button id="addBtn" class="btn-primary" onclick="addJob()" style="margin-top: 5px;">Save Entry</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz6JGqKSpnPegAraDGKd0kF1k5MH5kgIpu79OIrQ1CVZTSoJZ8z71nMwm6RXe19kuefPg/exec";
  let currentJobs = [];

  function openModal() {
    document.getElementById('jobModal').style.display = 'flex';
    document.getElementById('date').valueAsDate = new Date();
    document.body.style.overflow = 'hidden'; // Prevent background scroll
  }

  function closeModal() {
    document.getElementById('jobModal').style.display = 'none';
    document.body.style.overflow = 'auto'; 
  }

  window.onclick = function(event) {
    const modal = document.getElementById('jobModal');
    if (event.target == modal) closeModal();
  }

  const showLoading = (show) => {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.getElementById('addBtn').disabled = show;
  };

  const showError = (msg) => {
    const errDiv = document.getElementById('errorDisplay');
    if (msg) {
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
      setTimeout(() => errDiv.style.display = 'none', 5000);
    } else {
      errDiv.style.display = 'none';
    }
  };

  async function fetchJobs() {
    showError(null);
    try {
      showLoading(true);
      const response = await fetch(`${API_URL}?t=${Date.now()}`);
      if (!response.ok) throw new Error("Server error");
      
      currentJobs = await response.json();
      const body = document.getElementById('tableBody');
      body.innerHTML = '';
      
      currentJobs.forEach((job, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="font-weight: 600; color: #f8fafc;">${job.jobName || ''}</td>
          <td>${job.wo || ''}</td>
          <td>${job.location || ''}</td>
          <td><span class="status-pill">${job.status || 'N/A'}</span></td>
          <td style="color: #94a3b8;">${job.date ? new Date(job.date).toLocaleDateString() : ''}</td>
          <td>
            <button class="btn-delete" onclick="deleteJob(${index})">Delete</button>
          </td>
        `;
        body.appendChild(row);
      });
    } catch (err) {
      showError("Connection failed. Check your API URL.");
    } finally {
      showLoading(false);
    }
  }

  async function addJob() {
    const job = {
      action: 'add',
      jobName: document.getElementById('jobName').value,
      wo: document.getElementById('wo').value,
      location: document.getElementById('location').value,
      status: document.getElementById('status').value,
      date: document.getElementById('date').value
    };

    if(!job.jobName || !job.wo) {
      showError("Please fill in Job Name and WO.");
      return;
    }

    showLoading(true);
    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify(job)
      });
      
      document.getElementById('jobName').value = '';
      document.getElementById('wo').value = '';
      document.getElementById('status').value = '';
      
      closeModal();
      setTimeout(fetchJobs, 1500);
    } catch (e) {
      showError("Failed to add job.");
      showLoading(false);
    }
  }

  async function deleteJob(index) {
    if(!confirm("Delete this record?")) return;
    
    showLoading(true);
    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: 'delete', index: index })
      });
      setTimeout(fetchJobs, 1500);
    } catch (e) {
      showLoading(false);
    }
  }

  window.onload = fetchJobs;
</script>

</body>
</html>
